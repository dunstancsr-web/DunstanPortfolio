<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dunstan | Project Manager & Data Analyst</title>
    <meta
      name="description"
      content="Portfolio of Dunstan, a Project Manager with a Data Analyst background."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg aria-hidden="true" focusable="false" width="0" height="0" style="position:absolute">
      <defs>
        <filter id="glass-refract" primitiveUnits="objectBoundingBox" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.016 0.03" numOctaves="2" seed="9" result="noise" />
          <feGaussianBlur in="SourceGraphic" stdDeviation="0.02" result="soft" />
          <feDisplacementMap in="soft" in2="noise" scale="1.28" xChannelSelector="R" yChannelSelector="G">
            <animate attributeName="scale" to="1.82" dur="0.25s" begin="navGlass.mouseover" fill="freeze" />
            <animate attributeName="scale" to="1.28" dur="0.25s" begin="navGlass.mouseout" fill="freeze" />
          </feDisplacementMap>
        </filter>
        <filter id="glass-refract-static" primitiveUnits="objectBoundingBox" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.016 0.03" numOctaves="2" seed="9" result="noise" />
          <feGaussianBlur in="SourceGraphic" stdDeviation="0.02" result="soft" />
          <feDisplacementMap in="soft" in2="noise" scale="1.42" xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <filter id="liquid-refraction" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" seed="11" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="22" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <header class="site-header">
      <div class="container nav-wrap" id="navGlass">
        <div class="nav-tab nav-buttons-tab">
          <nav class="primary-nav" aria-label="Primary">
            <a href="#home">About</a>
            <a href="#projects">Projects</a>
          </nav>
        </div>
        <div class="nav-tab nav-toggle-tab">
          <div class="nav-controls">
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Theme mode: Auto. Switch mode" aria-pressed="false" data-icon="◐" data-mode-label="Auto"></button>
          </div>
        </div>
      </div>
    </header>

    <main id="home">
      <section class="hero container fade-section">
        <div class="hero-layout">
          <div class="hero-image-slot">
            <img class="hero-image" src="assets/images/profile-memoji.png" alt="Dunstan profile memoji" />
          </div>
          <div class="hero-content">
            <div class="hero-heading-row">
              <h1>
                Hi, I’m
                <a
                  class="hero-name-link"
                  href="https://www.linkedin.com/in/stan-5h4vc73g2/"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-tooltip="Let's Connect on Linkedin!"
                  aria-label="Let's Connect on Linkedin!"
                  >Dunstan</a
                >
              </h1>
            </div>
            <p class="hero-subtitle" aria-label="Roles and certifications">
              <span class="hero-pill">AI-Native Data Analyst</span>
              <span class="hero-pill">Project Manager</span>
              <span class="hero-pill">PMP</span>
            </p>
          </div>
          <p class="hero-about">
            I translate complex goals into structured plans, using data and clear communication 
            to drive project outcomes.
          </p>
        </div>
      </section>

      <section id="projects" class="section container">
        <div class="section-head">
          <h2>Projects</h2>
        </div>

        <div class="project-grid">
        </div>
      </section>
    </main>


    <footer class="site-footer" id="siteFooter">
      <div class="container footer-flex">
        <div class="footer-accessibility">
          <button class="glass-toggle" id="glassToggle" type="button" aria-label="Liquid Glass: On. Switch mode" aria-pressed="false" data-icon="◉" data-mode-label="LG On"></button>
        </div>
        <p>© <span id="year"></span> Dunstan. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
