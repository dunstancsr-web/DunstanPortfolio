<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Reels</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
        <header class="site-header">
            <div class="container nav-wrap">
                <div class="nav-tab nav-buttons-tab">
                    <nav class="primary-nav" aria-label="Primary">
                        <a href="index.html">Home</a>
                    </nav>
                </div>
            </div>
        </header>
        <main>
            <section class="hero container fade-section" style="margin-top:3.5rem;">
                <div style="display:flex;align-items:center;gap:1.2rem;">
                    <img src="assets/images/profile-memoji.png" alt="Dashboard Icon" style="width:56px;height:56px;border-radius:50%;box-shadow:0 2px 12px rgba(0,0,0,0.08);background:#fff;">
                    <div>
                        <h1 style="margin:0;font-size:2.2rem;font-weight:700;letter-spacing:-1px;">Portfolio Reels</h1>
                        <p style="margin:0.2rem 0 0 0;color:var(--muted);font-size:1.15rem;">A showcase of interactive dashboards and data stories.</p>
                    </div>
                </div>
            </section>
            <section class="container fade-section" style="margin-top:2.5rem;">
                <div class="dashboard-card" style="background:rgba(255,255,255,0.82);backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,0.10);border-radius:var(--radius);padding:2.2rem 1.5rem 1.5rem 1.5rem;max-width:900px;margin:0 auto 2.5rem auto;">
                      <h2 style="margin-top:0;font-size:1.4rem;font-weight:600;color:var(--accent);letter-spacing:-0.5px;"><a href="https://huggingface.co/spaces/dunstancsr/reviewsdataverse.streamlit" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;">AI-enabled Streamlit Dashboard (Hugging Face)</a></h2>
                    <div style="position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.07);">
                        <iframe src="https://dunstancsr-reviewsdataverse-streamlit.hf.space"
                                        frameborder="0"
                                        style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;"
                                        allowfullscreen></iframe>
                    </div>
                      <h2 style="margin-top:2.5rem;font-size:1.4rem;font-weight:600;color:var(--accent);letter-spacing:-0.5px;"><a href="https://reviewsdataverse.streamlit.app/?embed=true&embed_options=dark_theme,light_theme,show_padding,show_toolbar,show_colored_line" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;">AI-enabled Streamlit Dashboard (Streamlit)</a></h2>
                    <div style="position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:1.5rem;">
                        <iframe src="https://reviewsdataverse.streamlit.app/?embed=true&embed_options=dark_theme,light_theme,show_padding,show_toolbar,show_colored_line"
                                        frameborder="0"
                                        style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;"
                                        allowfullscreen></iframe>
                    </div>
                                            <h2 style="margin-top:2.5rem;font-size:1.4rem;font-weight:600;color:var(--accent);letter-spacing:-0.5px;"><a href="https://sia-reviews-ai.streamlit.app/?embed=true&embed_options=show_padding,show_footer,show_colored_line,light_theme,dark_theme,show_toolbar" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;">SIA Reviews AI Dashboard</a></h2>
                    <div style="position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:1.5rem;">
                                                <iframe src="https://sia-reviews-ai.streamlit.app/?embed=true&embed_options=show_padding,show_footer,show_colored_line,light_theme,dark_theme,show_toolbar"
                                        frameborder="0"
                                        style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:14px;"
                                        allowfullscreen></iframe>
                    </div>
                </div>
            </section>
        </main>
        <footer class="site-footer" id="siteFooter">
            <div class="container footer-flex">
                <p>&copy; <span id="year"></span> Dunstan Portfolio</p>
            </div>
        </footer>
        <script src="script.js"></script>
</html>
